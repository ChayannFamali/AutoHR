{# Блок заметок HR — используется для HTMX-swap после add_note_htmx. #}
{% if can_view_sensitive_data %}
    {% if application.notes %}
        <div class="notes-section">
            <hr>
            <div class="mb-3">
                <h6 class="text-muted mb-3">
                    <i class="fas fa-sticky-note me-2"></i>
                    Заметки HR
                </h6>
                <div class="bg-warning bg-opacity-10 p-3 rounded border-start border-warning border-4">
                    {{ application.notes|linebreaks }}
                </div>
            </div>
        </div>
    {% else %}
        <div class="notes-section"></div>
    {% endif %}
{% endif %}
